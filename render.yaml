services:
  - type: web
    name: edusenegal
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/elearning run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edusenegal-db
          property: connectionString

databases:
  - name: edusenegal-db
    plan: free

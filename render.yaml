services:
  - type: web
    name: edusenegal
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && BASE_PATH=/ pnpm --filter @workspace/elearning run build && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db run push-force && pnpm --filter @workspace/scripts run seed
    startCommand: node artifacts/api-server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: edusenegal-db
          property: connectionString

databases:
  - name: edusenegal-db
    plan: free
